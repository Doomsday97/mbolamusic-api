name: Build APK y publicar en website

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout mbolamusic-api (este repo)
        uses: actions/checkout@v4

      - name: Checkout mbolamusic-mobile
        uses: actions/checkout@v4
        with:
          repository: Doomsday97/mbolamusic-mobile
          token: ${{ secrets.API_DEPLOY_TOKEN }}
          path: mobile

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generar local.properties
        working-directory: mobile
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME"    >> android/local.properties

      - name: Gradle init — forzar compileSdk 36 y coreLibraryDesugaring
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/sdk_override.gradle << 'EOF'
          allprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android { compileSdkVersion 36 }
                      // Para el modulo app: garantizar coreLibraryDesugaring incluso si
                      // el bloque compileOptions del KTS fue parcialmente sobreescrito
                      if (project.name == 'app') {
                          try {
                              project.android.compileOptions.coreLibraryDesugaringEnabled = true
                          } catch (Exception ignored) {}
                          try {
                              if (!project.configurations.findByName('coreLibraryDesugaring')) {
                                  project.configurations.create('coreLibraryDesugaring')
                              }
                              project.dependencies.add('coreLibraryDesugaring', 'com.android.tools:desugar_jdk_libs:2.1.4')
                          } catch (Exception ignored) {}
                      }
                  }
              }
          }
          EOF

      - name: Instalar dependencias Flutter
        working-directory: mobile
        run: flutter pub get

      - name: Verificar configuracion coreLibraryDesugaring
        working-directory: mobile
        run: |
          echo "=== android/app/build.gradle.kts ==="
          cat android/app/build.gradle.kts
          echo ""
          echo "=== Verificando isCoreLibraryDesugaringEnabled ==="
          grep -n "isCoreLibraryDesugaringEnabled\|coreLibraryDesugaring\|minSdk" android/app/build.gradle.kts || echo "AVISO: propiedades no encontradas"

      - name: Build APK release (ARM64)
        working-directory: mobile
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi --dart-define=ENV=prod --dart-define=API_URL=https://mbolamusic-apionrender.com/api

      - name: Localizar APK generado
        run: |
          echo "=== APKs generados ==="
          find mobile/build/app/outputs -name "*.apk" -type f
          APK=$(find mobile/build/app/outputs -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: no se encontro ningun APK"
            exit 1
          fi
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "Tamano: $(du -sh "$APK" | cut -f1)"

      - name: Copiar APK a website/
        run: |
          mkdir -p website
          cp "$APK_PATH" website/mbolamusic.apk
          echo "APK copiado a website/mbolamusic.apk"

      - name: Subir APK como artefacto de GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mbolamusic-arm64-release
          path: website/mbolamusic.apk
          if-no-files-found: error
          retention-days: 30

      - name: Commit y push del APK en website/
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add website/mbolamusic.apk
          if git diff --cached --quiet; then
            echo "APK sin cambios, nada que publicar."
          else
            git commit -m "chore: actualizar APK desde build automatico [skip ci]"
            # Si dos builds concurrentes colisionan en el APK binario, tomar nuestra version (recien compilada)
            git pull --rebase origin main || {
              git checkout --theirs website/mbolamusic.apk
              git add website/mbolamusic.apk
              GIT_EDITOR=true git rebase --continue
            }
            git push origin main
          fi
          echo "Listo. APK disponible en website/mbolamusic.apk"
