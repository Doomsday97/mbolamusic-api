<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MbôláMusic — Reproduciendo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --amber: #F59E0B; --bg: #080808; --bg2: #111; --bg3: #1a1a1a;
    --text: #F0F0F0; --text2: #A0A0A0; --border: rgba(255,255,255,0.08);
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }

  /* NAV */
  nav { background: rgba(8,8,8,0.95); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
  .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; height: 60px; display: flex; align-items: center; gap: 12px; }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); font-weight: 700; }
  .logo-icon { width: 34px; height: 34px; background: var(--amber); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
  .back-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--text2); padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; text-decoration: none; }

  /* PLAYER SECTION */
  .player-wrap { max-width: 900px; margin: 0 auto; padding: 3rem 1.5rem 2rem; }

  .player-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 340px;
  }

  /* Cover */
  .cover-area {
    position: relative;
    background: rgba(245,158,11,0.12);
    display: flex; align-items: center; justify-content: center;
    font-size: 5rem;
    overflow: hidden;
  }
  .cover-area img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .cover-blur { position: absolute; inset: 0; background: rgba(0,0,0,0.15); }

  /* Info + controls */
  .controls-area { padding: 2rem 2rem 1.5rem; display: flex; flex-direction: column; justify-content: space-between; }
  .track-meta { margin-bottom: 1.5rem; }
  .track-meta .genre-tag { font-size: 0.72rem; color: var(--amber); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; margin-bottom: 10px; display: block; }
  .track-meta h1 { font-size: 1.7rem; font-weight: 800; line-height: 1.15; margin-bottom: 8px; }
  .track-meta .artist { font-size: 1rem; color: var(--text2); margin-bottom: 16px; }
  .track-meta .stats { display: flex; gap: 1.5rem; }
  .track-meta .stat { display: flex; align-items: center; gap: 5px; font-size: 0.82rem; color: var(--text2); }
  .track-meta .stat span { color: var(--text); font-weight: 600; }

  /* Audio controls */
  .audio-section { display: flex; flex-direction: column; gap: 12px; }
  .progress-wrap { position: relative; }
  .progress-bar { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 9px; cursor: pointer; appearance: none; accent-color: var(--amber); }
  .time-row { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text2); margin-top: 4px; }

  .btn-row { display: flex; align-items: center; gap: 12px; }
  .btn-play-big {
    width: 56px; height: 56px; border-radius: 50%; background: var(--amber);
    border: none; color: #000; font-size: 1.4rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: transform .1s;
  }
  .btn-play-big:active { transform: scale(0.95); }
  .volume-row { display: flex; align-items: center; gap: 8px; }
  .volume-icon { font-size: 1rem; color: var(--text2); cursor: pointer; }
  .volume-bar { flex: 1; height: 4px; accent-color: var(--amber); cursor: pointer; }

  .native-audio { width: 100%; margin-top: 8px; height: 36px; }

  /* RELATED */
  .related-section { margin-top: 2.5rem; }
  .related-section h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem; }
  .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
  .related-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: border-color .2s, transform .15s; }
  .related-card:hover { border-color: rgba(245,158,11,.4); transform: translateY(-2px); }
  .related-thumb { height: 110px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; position: relative; background: var(--bg3); }
  .related-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .related-info { padding: 10px; }
  .related-info strong { font-size: 0.85rem; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .related-info span { font-size: 0.75rem; color: var(--text2); }

  /* LOADING / ERROR */
  .center { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 1rem; color: var(--text2); }

  @media(max-width: 640px) {
    .player-card { grid-template-columns: 1fr; }
    .cover-area { height: 220px; }
    .controls-area { padding: 1.5rem; }
    .track-meta h1 { font-size: 1.35rem; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="back-btn" href="javascript:history.back()">← Volver</a>
    <a class="logo" href="/"><div class="logo-icon">🎵</div> MbôláMusic</a>
  </div>
</nav>

<div class="player-wrap">
  <div id="loading" class="center">
    <div style="font-size:2.5rem;">🎵</div>
    <p>Cargando canción…</p>
  </div>

  <div id="player-content" style="display:none;">
    <div class="player-card">
      <!-- Portada -->
      <div class="cover-area" id="cover-area">
        <span id="cover-emoji">🎵</span>
        <img id="cover-img" style="display:none;" alt="Portada">
        <div class="cover-blur"></div>
      </div>

      <!-- Info + controles -->
      <div class="controls-area">
        <div class="track-meta">
          <span class="genre-tag" id="genre-tag">—</span>
          <h1 id="track-title">—</h1>
          <p class="artist" id="track-artist">—</p>
          <div class="stats">
            <div class="stat">▶ <span id="play-count">0</span> reproducciones</div>
            <div class="stat">⬇ <span id="dl-count">0</span> descargas</div>
          </div>
        </div>

        <div class="audio-section">
          <!-- Barra de progreso custom -->
          <div class="progress-wrap">
            <input type="range" class="progress-bar" id="seek-bar" min="0" max="100" value="0">
            <div class="time-row">
              <span id="time-cur">0:00</span>
              <span id="time-dur">0:00</span>
            </div>
          </div>

          <!-- Controles -->
          <div class="btn-row">
            <button class="btn-play-big" id="play-btn" onclick="togglePlay()">▶</button>
            <div class="volume-row" style="flex:1;">
              <span class="volume-icon" onclick="toggleMute()">🔊</span>
              <input type="range" class="volume-bar" id="vol-bar" min="0" max="1" step="0.01" value="1" style="flex:1;" oninput="setVolume(this.value)">
            </div>
          </div>

          <!-- Reproductor nativo de fallback -->
          <audio id="main-audio"></audio>
        </div>
      </div>
    </div>

    <!-- Canciones relacionadas -->
    <div class="related-section">
      <h2>Más canciones del mismo género</h2>
      <div class="related-grid" id="related-grid">
        <div class="center" style="grid-column:1/-1;min-height:80px;"><p>Cargando…</p></div>
      </div>
    </div>
  </div>

  <div id="error-state" class="center" style="display:none;">
    <div style="font-size:2.5rem;">😕</div>
    <p id="error-msg">No se encontró la canción.</p>
    <a href="/" style="color:var(--amber);text-decoration:none;font-weight:600;">← Volver al inicio</a>
  </div>
</div>

<script>
const API = 'https://mbolamusic-api-1.onrender.com/api';
const params = new URLSearchParams(location.search);
const trackId = params.get('id');
const audio = document.getElementById('main-audio');

function fmt(s) {
  s = Math.floor(s || 0);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}
function numFmt(n) { return Number(n||0).toLocaleString('es'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadTrack() {
  if (!trackId) { showError('No se especificó ninguna canción.'); return; }
  try {
    const r = await fetch(API + '/tracks/' + trackId);
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    const t = j.data.track;

    // Rellenar UI
    document.title = t.title + ' — MbôláMusic';
    document.getElementById('genre-tag').textContent    = t.genre.toUpperCase();
    document.getElementById('track-title').textContent  = t.title;
    document.getElementById('track-artist').textContent = t.artist?.artistName || 'Artista desconocido';
    document.getElementById('play-count').textContent   = numFmt(t._count?.plays);
    document.getElementById('dl-count').textContent     = numFmt(t._count?.downloads);

    if (t.coverUrl) {
      const img = document.getElementById('cover-img');
      img.src = t.coverUrl;
      img.style.display = '';
      document.getElementById('cover-emoji').style.display = 'none';
    }

    // Audio
    audio.src = t.audioUrl;
    audio.load();

    // Seek bar
    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      document.getElementById('seek-bar').value = pct;
      document.getElementById('time-cur').textContent = fmt(audio.currentTime);
      document.getElementById('time-dur').textContent = fmt(audio.duration);
    });
    audio.addEventListener('ended', () => {
      document.getElementById('play-btn').textContent = '▶';
    });
    document.getElementById('seek-bar').addEventListener('input', function() {
      if (audio.duration) audio.currentTime = (this.value / 100) * audio.duration;
    });

    // Mostrar
    document.getElementById('loading').style.display = 'none';
    document.getElementById('player-content').style.display = '';

    // Cargar relacionadas
    loadRelated(t.genre, t.id);

  } catch(e) {
    showError(e.message || 'No se pudo cargar la canción.');
  }
}

function togglePlay() {
  const btn = document.getElementById('play-btn');
  if (audio.paused) { audio.play().catch(()=>{}); btn.textContent = '⏸'; }
  else              { audio.pause(); btn.textContent = '▶'; }
}

function setVolume(v) { audio.volume = v; }

function toggleMute() {
  audio.muted = !audio.muted;
  document.querySelector('.volume-icon').textContent = audio.muted ? '🔇' : '🔊';
}

async function loadRelated(genre, excludeId) {
  const grid = document.getElementById('related-grid');
  try {
    const r = await fetch(API + '/tracks?genre=' + encodeURIComponent(genre) + '&limit=8');
    const j = await r.json();
    const tracks = (j?.data?.tracks || []).filter(t => t.id !== excludeId).slice(0, 8);
    if (!tracks.length) { grid.innerHTML = '<p style="color:var(--text2);padding:1rem;grid-column:1/-1;">Sin canciones relacionadas.</p>'; return; }
    const bgColors = ['rgba(245,158,11,0.12)','rgba(63,81,181,0.18)','rgba(0,154,68,0.12)','rgba(239,68,68,0.12)'];
    grid.innerHTML = tracks.map((t, i) => `
      <div class="related-card" onclick="window.location.href='/player.html?id=${t.id}'">
        <div class="related-thumb" style="background:${bgColors[i%4]};">
          🎵
          ${t.coverUrl ? `<img src="${t.coverUrl}" onerror="this.remove()">` : ''}
        </div>
        <div class="related-info">
          <strong>${esc(t.title)}</strong>
          <span>${esc(t.artist?.artistName||'')}</span>
        </div>
      </div>`).join('');
  } catch { grid.innerHTML = ''; }
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-state').style.display = '';
}

loadTrack();
</script>
</body>
</html>
