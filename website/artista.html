<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MbôláMusic — Mi perfil artista</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --amber: #F59E0B; --amber-dark: #D97706; --amber-light: #FCD34D;
    --bg: #080808; --bg2: #111; --bg3: #1a1a1a;
    --text: #F0F0F0; --text2: #A0A0A0;
    --border: rgba(255,255,255,0.08);
    --green: #22c55e; --red: #ef4444;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }

  nav { background: rgba(8,8,8,0.95); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
  .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); font-weight: 700; }
  .logo-icon { width: 34px; height: 34px; background: var(--amber); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
  .nav-actions { display: flex; align-items: center; gap: 10px; }
  .btn-outline { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--text2); padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }

  .lang-sel { display: flex; gap: 4px; }
  .lang-opt { padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 0.78rem; color: var(--text2); transition: background .15s; }
  .lang-opt:hover { background: rgba(255,255,255,0.08); }
  .lang-opt.active { background: rgba(245,158,11,0.18); color: var(--amber); font-weight: 600; }

  .page { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; margin-bottom: 1.5rem; }
  .stat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; text-align: center; }
  .stat-card .val { font-size: 1.8rem; font-weight: 800; color: var(--amber); }
  .stat-card .lbl { font-size: 0.78rem; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: .04em; }

  .sub-banner { border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  .sub-active  { background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.3); }
  .sub-inactive { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
  .sub-banner h3 { font-size: 1rem; font-weight: 700; }
  .sub-banner p  { font-size: 0.82rem; color: var(--text2); margin-top: 2px; }
  .btn-pay { background: var(--amber); border: none; color: #000; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.9rem; }

  .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .fg { display: flex; flex-direction: column; gap: 6px; }
  .fg label { font-size: 0.72rem; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
  .fg input, .fg select { background: var(--bg3); border: 1px solid #333; border-radius: 9px; color: var(--text); padding: 10px 13px; font-size: 0.92rem; width: 100%; }
  .fg input:focus, .fg select:focus { outline: 1px solid var(--amber); }
  .fg input[type=file] { padding: 8px; }
  .full { grid-column: 1 / -1; }
  .btn-upload { background: var(--amber); border: none; color: #000; padding: 11px 28px; border-radius: 10px; font-weight: 700; font-size: 0.95rem; cursor: pointer; }
  .btn-upload:disabled { opacity: .5; cursor: default; }
  .upload-msg { font-size: 0.85rem; margin-top: 8px; }

  .track-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .track-row:last-child { border-bottom: none; }
  .track-cover { width: 44px; height: 44px; border-radius: 8px; background: var(--bg3); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
  .track-cover img { width: 100%; height: 100%; object-fit: cover; }
  .track-info { flex: 1; min-width: 0; }
  .track-info strong { display: block; font-size: 0.92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-info span { font-size: 0.78rem; color: var(--text2); }
  .badge-pub   { background: rgba(34,197,94,0.15);  color: var(--green); border: 1px solid rgba(34,197,94,0.3);  border-radius: 6px; padding: 2px 8px; font-size: 0.72rem; font-weight: 600; }
  .badge-hidden { background: rgba(239,68,68,0.15); color: var(--red);   border: 1px solid rgba(239,68,68,0.3);   border-radius: 6px; padding: 2px 8px; font-size: 0.72rem; font-weight: 600; }
  .track-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-sm { padding: 6px 12px; border: none; border-radius: 7px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
  .btn-play   { background: rgba(245,158,11,0.2); color: var(--amber); }
  .btn-delete { background: rgba(239,68,68,0.15); color: var(--red); }

  #mini-player { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.97); border-top: 1px solid rgba(245,158,11,0.3); padding: 12px 1.5rem; z-index: 9999; backdrop-filter: blur(12px); }
  .mp-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .mp-info { flex: 1; min-width: 100px; }
  .mp-info strong { display: block; font-size: 0.9rem; }
  .mp-info span { font-size: 0.75rem; color: var(--text2); }

  .section { margin-bottom: 2rem; }
  .empty { color: var(--text2); text-align: center; padding: 3rem; opacity: .6; }

  @media(max-width:640px) {
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .full { grid-column: 1; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="logo" href="/"><div class="logo-icon">🎵</div> MbôláMusic</a>
    <div class="nav-actions">
      <div class="lang-sel">
        <div class="lang-opt" onclick="setLang('es')">ES</div>
        <div class="lang-opt" onclick="setLang('fr')">FR</div>
        <div class="lang-opt" onclick="setLang('pt')">PT</div>
        <div class="lang-opt" onclick="setLang('en')">EN</div>
      </div>
      <span id="nav-name" style="font-size:0.85rem;color:var(--text2);"></span>
      <button class="btn-outline" onclick="openEditProfile()" id="btn-edit-profile" style="border-color:rgba(245,158,11,0.4);color:var(--amber);">✏ Perfil</button>
      <button class="btn-outline" id="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>
</nav>

<div class="page">

  <div id="sub-banner" class="sub-banner sub-inactive">
    <div>
      <h3 id="sub-title">…</h3>
      <p id="sub-detail"></p>
    </div>
    <button class="btn-pay" id="sub-btn" onclick="paySubscription()" style="display:none;"></button>
  </div>

  <div class="grid-3">
    <div class="stat-card"><div class="val" id="st-tracks">—</div><div class="lbl" id="lbl-songs">Canciones</div></div>
    <div class="stat-card"><div class="val" id="st-plays">—</div><div class="lbl" id="lbl-plays">Reproducciones</div></div>
    <div class="stat-card"><div class="val" id="st-earn">—</div><div class="lbl" id="lbl-earn">Ganancias FCFA</div></div>
  </div>

  <div class="section card">
    <div class="section-title" id="title-upload">➕ Subir nueva canción</div>
    <div class="form-grid">
      <div class="fg"><label id="lbl-title">Título *</label><input id="up-title" type="text"></div>
      <div class="fg">
        <label id="lbl-genre">Género *</label>
        <select id="up-genre">
          <option value="afrobeat">Afrobeat</option>
          <option value="reggaeton">Reggaeton</option>
          <option value="gospel">Gospel</option>
          <option value="ndombolo">Ndombolo</option>
          <option value="hiphop">Hip-Hop</option>
          <option value="pop">Pop</option>
          <option value="tradicional">Tradicional</option>
          <option value="otro" id="opt-other">Otro</option>
        </select>
      </div>
      <div class="fg"><label id="lbl-audio">Archivo de audio (MP3/AAC) *</label><input id="up-audio" type="file" accept="audio/*"></div>
      <div class="fg"><label id="lbl-cover">Portada (imagen)</label><input id="up-cover" type="file" accept="image/*"></div>
      <div class="fg full"><label id="lbl-album">Álbum (opcional)</label><input id="up-album" type="text"></div>
    </div>
    <div style="margin-top:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <button class="btn-upload" id="up-btn" onclick="uploadTrack()">⬆ <span id="btn-upload-text">Subir canción</span></button>
      <span class="upload-msg" id="up-msg"></span>
    </div>
  </div>

  <div class="section card">
    <div class="section-title" id="title-mytracks">🎵 Mis canciones</div>
    <div id="track-list"><div class="empty" id="loading-tracks">Cargando…</div></div>
  </div>

</div>

<!-- EDIT PROFILE MODAL -->
<div id="edit-modal" onclick="if(event.target===this)closeEditProfile()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:10000;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:#151515;border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:2rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;position:relative;">
    <button onclick="closeEditProfile()" style="position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text2);font-size:1.3rem;cursor:pointer;">✕</button>
    <h3 id="ep-title" style="margin-bottom:1.5rem;font-size:1.15rem;">✏ Editar perfil</h3>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <label id="ep-user-lbl" style="font-size:0.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px;">Usuario</label>
        <input id="ep-username" type="text" style="width:100%;padding:11px 14px;background:#1f1f1f;border:1px solid #333;border-radius:10px;color:#fff;font-size:0.95rem;">
      </div>
      <div>
        <label id="ep-country-lbl" style="font-size:0.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px;">País</label>
        <input id="ep-country" type="text" style="width:100%;padding:11px 14px;background:#1f1f1f;border:1px solid #333;border-radius:10px;color:#fff;font-size:0.95rem;">
      </div>
      <div>
        <label id="ep-city-lbl" style="font-size:0.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px;">Ciudad</label>
        <input id="ep-city" type="text" style="width:100%;padding:11px 14px;background:#1f1f1f;border:1px solid #333;border-radius:10px;color:#fff;font-size:0.95rem;">
      </div>
      <hr style="border-color:rgba(255,255,255,0.08);">
      <p id="ep-artist-section-lbl" style="font-size:0.72rem;color:var(--amber);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:-6px;">Perfil artístico</p>
      <div>
        <label id="ep-artname-lbl" style="font-size:0.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px;">Nombre artístico</label>
        <input id="ep-artistname" type="text" style="width:100%;padding:11px 14px;background:#1f1f1f;border:1px solid #333;border-radius:10px;color:#fff;font-size:0.95rem;">
      </div>
      <div>
        <label id="ep-bio-lbl" style="font-size:0.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px;">Biografía</label>
        <textarea id="ep-bio" rows="3" style="width:100%;padding:11px 14px;background:#1f1f1f;border:1px solid #333;border-radius:10px;color:#fff;font-size:0.95rem;resize:vertical;font-family:inherit;"></textarea>
      </div>
      <div id="ep-err" style="color:#f87171;font-size:0.85rem;display:none;"></div>
      <div id="ep-ok" style="color:#22c55e;font-size:0.85rem;display:none;"></div>
      <button id="ep-save-btn" onclick="saveProfile()" style="background:var(--amber);color:#000;border:none;border-radius:10px;padding:12px;font-weight:700;font-size:0.95rem;cursor:pointer;width:100%;">Guardar cambios</button>
    </div>
  </div>
</div>

<div id="mini-player">
  <div class="mp-inner">
    <div class="mp-info">
      <strong id="mp-title">—</strong>
      <span id="mp-artist">—</span>
    </div>
    <audio id="mp-audio" controls style="flex:2;min-width:200px;height:36px;"></audio>
    <button class="btn-outline" style="font-size:0.8rem;padding:6px 12px;" onclick="closePlayer()">✕</button>
  </div>
</div>

function tr(key, ...args) {
  var _tv = (T[_lang] || T.es)[key]; var s = _tv != null ? _tv : (T.es[key] != null ? T.es[key] : key);
  args.forEach((a, i) => { s = s.replace('{' + i + '}', a); });
  return s;
}

function setLang(code, save = true) {
  _lang = code;
  if (save) localStorage.setItem('mbola_lang', code);
  document.querySelectorAll('.lang-opt').forEach(el => {
    el.classList.toggle('active', el.textContent.toLowerCase() === code);
  });
  document.getElementById('btn-logout').textContent       = tr('logout');
  document.getElementById('lbl-songs').textContent        = tr('lblSongs');
  document.getElementById('lbl-plays').textContent        = tr('lblPlays');
  document.getElementById('lbl-earn').textContent         = tr('lblEarn');
  document.getElementById('title-upload').textContent     = tr('titleUpload');
  document.getElementById('lbl-title').textContent        = tr('lblTitle');
  document.getElementById('lbl-genre').textContent        = tr('lblGenre');
  document.getElementById('lbl-audio').textContent        = tr('lblAudio');
  document.getElementById('lbl-cover').textContent        = tr('lblCover');
  document.getElementById('lbl-album').textContent        = tr('lblAlbum');
  document.getElementById('opt-other').textContent        = tr('optOther');
  document.getElementById('btn-upload-text').textContent    = tr('btnUpload');
  document.getElementById('title-mytracks').textContent     = tr('titleMyTracks');
  document.getElementById('btn-edit-profile').textContent   = tr('editProfile');
  document.getElementById('ep-title').textContent           = tr('epTitle');
  document.getElementById('ep-user-lbl').textContent        = tr('epUserLbl');
  document.getElementById('ep-country-lbl').textContent     = tr('epCountryLbl');
  document.getElementById('ep-city-lbl').textContent        = tr('epCityLbl');
  document.getElementById('ep-artist-section-lbl').textContent = tr('epArtistSection');
  document.getElementById('ep-artname-lbl').textContent     = tr('epArtnameLbl');
  document.getElementById('ep-bio-lbl').textContent         = tr('epBioLbl');
  document.getElementById('ep-save-btn').textContent        = tr('saveChanges');
  if (_user.username) {
    document.getElementById('nav-name').textContent = tr('navName', _user.username);
  }
}

function init() {
  _lang  = localStorage.getItem('mbola_lang') || 'es';
  _token = localStorage.getItem('mbola_token') || '';
  _user  = JSON.parse(localStorage.getItem('mbola_user') || '{}');
  if (!_token || _user.role !== 'ARTIST') { window.location.href = '/'; return; }
  setLang(_lang, false);
  loadDashboard();
  loadMyTracks();
}

function openEditProfile() {
  document.getElementById('ep-username').value   = _user.username   || '';
  document.getElementById('ep-country').value    = _user.country    || '';
  document.getElementById('ep-city').value       = _user.city       || '';
  document.getElementById('ep-artistname').value = _user.artistName || '';
  document.getElementById('ep-bio').value        = '';
  document.getElementById('ep-err').style.display = 'none';
  document.getElementById('ep-ok').style.display  = 'none';
  document.getElementById('edit-modal').style.display = 'flex';
}
function closeEditProfile() {
  document.getElementById('edit-modal').style.display = 'none';
}
async function saveProfile() {
  const btn = document.getElementById('ep-save-btn');
  const err = document.getElementById('ep-err');
  const ok  = document.getElementById('ep-ok');
  err.style.display = 'none'; ok.style.display = 'none';
  btn.disabled = true; btn.textContent = tr('saving') || 'Guardando…';
  try {
    const body = {
      username:   document.getElementById('ep-username').value.trim(),
      country:    document.getElementById('ep-country').value.trim(),
      city:       document.getElementById('ep-city').value.trim(),
      artistName: document.getElementById('ep-artistname').value.trim(),
      bio:        document.getElementById('ep-bio').value.trim(),
    };
    const r = await apiFetch('/auth/profile', 'PUT', body);
    _user = { ..._user, ...r.user, artistName: body.artistName };
    localStorage.setItem('mbola_user', JSON.stringify(_user));
    document.getElementById('nav-name').textContent = tr('navName', _user.username);
    ok.textContent = '✅ ' + (tr('profileSaved') || 'Perfil actualizado');
    ok.style.display = '';
    setTimeout(closeEditProfile, 1500);
  } catch(e) {
    err.textContent = e.message;
    err.style.display = '';
  } finally {
    btn.disabled = false; btn.textContent = tr('saveChanges') || 'Guardar cambios';
  }
}

function logout() {
  localStorage.removeItem('mbola_token');
  localStorage.removeItem('mbola_user');
  window.location.href = '/';
}

async function loadDashboard() {
  try {
    const r = await apiFetch('/artist/dashboard');
    document.getElementById('st-tracks').textContent = r.totalTracks;
    document.getElementById('st-plays').textContent  = fmt(r.totalPlays);
    document.getElementById('st-earn').textContent   = fmt(r.totalEarnings);
    const banner = document.getElementById('sub-banner');
    const title  = document.getElementById('sub-title');
    const detail = document.getElementById('sub-detail');
    const btn    = document.getElementById('sub-btn');
    if (r.subscriptionActive) {
      banner.className = 'sub-banner sub-active';
      title.textContent  = tr('subActive');
      const end = r.subscriptionEndsAt ? new Date(r.subscriptionEndsAt).toLocaleDateString(_lang) : '—';
      detail.textContent = tr('subValidUntil') + ' ' + end + ' ' + tr('subCanPublish');
      btn.style.display = 'none';
    } else {
      banner.className = 'sub-banner sub-inactive';
      title.textContent  = tr('subInactive');
      detail.textContent = tr('subPayMsg');
      btn.textContent    = tr('subPayBtn');
      btn.style.display  = '';
    }
  } catch(e) {
    document.getElementById('sub-title').textContent = tr('subError');
  }
}

async function paySubscription() {
  const btn = document.getElementById('sub-btn');
  btn.disabled = true; btn.textContent = tr('subProcessing');
  try {
    await apiFetch('/payments/artist-subscription', 'POST', { method: 'MOCK' });
    loadDashboard(); loadMyTracks();
  } catch(e) { alert(tr('payErr') + e.message); }
  finally { btn.disabled = false; btn.textContent = tr('subPayBtn'); }
}

async function loadMyTracks() {
  const el = document.getElementById('track-list');
  try {
    const d = await apiFetch('/tracks/mine');
    const tracks = d.tracks || [];
    if (!tracks.length) { el.innerHTML = '<div class="empty">' + tr('noTracks') + '</div>'; return; }
    el.innerHTML = tracks.map(t2 => `
      <div class="track-row" id="tr-${t2.id}">
        <div class="track-cover">${t2.coverUrl ? `<img src="${esc(t2.coverUrl)}" onerror="this.style.display='none'">` : '🎵'}</div>
        <div class="track-info">
          <strong>${esc(t2.title)}</strong>
          <span>${esc(t2.genre)} · ${t2.playCount||0} ${tr('plays')} · ${t2.downloadCount||0} ${tr('downloads')}</span>
        </div>
        <span class="${t2.isPublished ? 'badge-pub' : 'badge-hidden'}">${t2.isPublished ? tr('badgePub') : tr('badgeHidden')}</span>
        <div class="track-actions">
          <button class="btn-sm btn-play" onclick="window.location.href='/player.html?id=${t2.id}'">${tr('btnPlayer')}</button>
          <button class="btn-sm btn-delete" onclick="deleteTrack('${t2.id}','${esc(t2.title)}')">${tr('btnDelete')}</button>
        </div>
      </div>`).join('');
  } catch(e) { el.innerHTML = '<div class="empty">' + e.message + '</div>'; }
}

async function uploadTrack() {
  const title = document.getElementById('up-title').value.trim();
  const genre = document.getElementById('up-genre').value;
  const album = document.getElementById('up-album').value.trim();
  const audio = document.getElementById('up-audio').files[0];
  const cover = document.getElementById('up-cover').files[0];
  const msg   = document.getElementById('up-msg');
  const btn   = document.getElementById('up-btn');
  if (!title) { showMsg(msg, tr('errTitle'), 'red'); return; }
  if (!audio) { showMsg(msg, tr('errAudio'), 'red'); return; }
  btn.disabled = true; showMsg(msg, tr('uploading'), 'gray');
  try {
    const fd = new FormData();
    fd.append('title', title); fd.append('genre', genre);
    if (album) fd.append('album', album);
    fd.append('audio', audio);
    if (cover) fd.append('cover', cover);
    const r = await fetch(API + '/tracks', { method:'POST', headers:{'Authorization':'Bearer '+_token}, body:fd });
    const j = await r.json();
    if (!j.success) throw new Error(j.error || tr('uploadErr'));
    showMsg(msg, tr('uploadOk', j.data.track.title), 'green');
    document.getElementById('up-title').value = '';
    document.getElementById('up-audio').value = '';
    document.getElementById('up-cover').value = '';
    loadMyTracks();
  } catch(e) { showMsg(msg, tr('uploadErr') + ': ' + e.message, 'red'); }
  finally { btn.disabled = false; }
}

function showMsg(el, text, color) {
  el.textContent = text;
  el.style.color = color==='green'?'var(--green)':color==='red'?'var(--red)':'var(--text2)';
}

async function deleteTrack(id, title) {
  if (!confirm(tr('deleteConfirm', title))) return;
  try {
    await apiFetch('/tracks/'+id, 'DELETE');
    const row = document.getElementById('tr-'+id);
    if (row) row.remove();
  } catch(e) { alert(e.message); }
}

function playTrack(urlEnc, title, artist) {
  const audio = document.getElementById('mp-audio');
  document.getElementById('mp-title').textContent  = title;
  document.getElementById('mp-artist').textContent = artist;
  audio.src = decodeURIComponent(urlEnc); audio.play().catch(()=>{});
  document.getElementById('mini-player').style.display = '';
}
function closePlayer() { document.getElementById('mp-audio').pause(); document.getElementById('mini-player').style.display='none'; }

async function apiFetch(path, method='GET', body=null) {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + _token } };
  if (body) { opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body); }
  const r = await fetch(API+path, opts);
  const j = await r.json();
  if (!j.success) throw new Error(j.error||'Error');
  return j.data;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmt(n) { return Number(n||0).toLocaleString(_lang); }

init();
</script>
</body>
</html>
