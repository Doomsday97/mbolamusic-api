services:
  - type: web
    name: mbolamusic-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: PAYMENT_PROVIDER
        value: mock
      # STORAGE: cambia a "s3" cuando tengas las credenciales de Cloudflare R2
      - key: STORAGE_PROVIDER
        value: local
      - key: UPLOAD_DIR
        value: uploads
      # Cloudflare R2 / AWS S3 (solo necesario si STORAGE_PROVIDER=s3)
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: CDN_BASE_URL
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACL
        value: public-read
      - key: BANK_NAME
        value: BGFI Bank Guinea Ecuatorial
      - key: BANK_ACCOUNT_NAME
        value: MbôláMusic SARL
      - key: BANK_ACCOUNT_NUMBER
        value: 000000000000

