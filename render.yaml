services:
  - type: web
    name: mbolamusic-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci && npx prisma generate
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      # ── Base de datos ──────────────────────────────────────────────────────────
      # Configurar manualmente en Render dashboard (Neon.tech connection string)
      - key: DATABASE_URL
        sync: false

      # ── Servidor ──────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ── Seguridad JWT ─────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d

      # ── CORS ─────────────────────────────────────────────────────────────────
      # En producción no necesitamos orígenes extra: OWN_DOMAINS cubre la web.
      # La APK envía peticiones sin Origin y también está permitida.
      - key: ALLOWED_ORIGINS
        value: ""

      # ── Pagos ────────────────────────────────────────────────────────────────
      - key: PAYMENT_PROVIDER
        value: mock
      - key: BANK_NAME
        value: BGFI Bank Guinea Ecuatorial
      - key: BANK_ACCOUNT_NAME
        value: "MbôláMusic SARL"
      - key: BANK_ACCOUNT_NUMBER
        value: "000000000000"
      # Flutterwave: configurar en dashboard si se activa
      - key: FLW_PUBLIC_KEY
        sync: false
      - key: FLW_SECRET_KEY
        sync: false
      - key: FLW_ENCRYPTION_KEY
        sync: false
      - key: FLW_WEBHOOK_HASH
        sync: false

      # ── Almacenamiento (Cloudflare R2) ────────────────────────────────────────
      # sync: false = Render usa el valor del dashboard y NO lo sobreescribe en cada deploy.
      # IMPORTANTE: cambiar STORAGE_PROVIDER a "s3" en el dashboard para activar R2.
      - key: STORAGE_PROVIDER
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: CDN_BASE_URL
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACL
        value: public-read
      - key: S3_FORCE_PATH_STYLE
        value: "false"
